services:
  - type: web
    name: real-estate-transaction-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: API_PREFIX
        value: api
      - key: CORS_ORIGIN
        sync: false
      - key: CORS_CREDENTIALS
        value: false
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: real_estate_platform
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        sync: false
      - key: RESEND_FROM_NAME
        value: Real Estate Platform
